<div class="dashboard">
    <div id="sidebarContainer"></div>
    <main class="dashboard-content">
        <div class="page">
            <div class="header">
                <h1 class="page-title">
                    <em>Invite Students</em>
                </h1>
                <button id="backButton">Back</button>
            </div>
            <p class="page-description">
                <em>
                    Invita nuovi studenti nella classroom tramite email. Gli studenti invitati riceveranno un codice di accesso per partecipare alla classe.
                </em>
            </p>
            <div class="classroom-card">
                <h2>Invita Studenti</h2>
                <div class="input-group">
                    <label for="searchEmail">
                        Cerca uno studente
                    </label>

                    <input
                            type="text"
                            id="searchEmail"
                            placeholder="Inserisci l'indirizzo email dello studente">
                </div>
                <div id="studentCards" class="student-grid">
                </div>
            </div>
        </div>
    </main>
</div>
